name: conda_sigstore tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    # py-sigstore is currently published for osx-arm64 only via the thath
    # prefix.dev channel, so CI runs on Apple Silicon.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: latest
          # Re-use the locked environment from pixi.lock for reproducibility.
          frozen: true
          environments: dev

      - name: Run tests
        run: pixi run -e dev pytest tests/ -v
