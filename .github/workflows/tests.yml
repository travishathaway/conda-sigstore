name: conda_sigstore tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: osx-arm64
            runs-on: macos-latest
          - platform: linux-aarch64
            runs-on: ubuntu-24.04-arm

    runs-on: ${{ matrix.runs-on }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: latest
          frozen: true
          environments: dev

      - name: Run tests
        run: pixi run -e dev pytest tests/ -v
